<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <rect width="128" height="128" rx="28" fill="#0e7a64"/>
  <!-- partograph grid -->
  <g stroke="#ffffff" stroke-opacity="0.25" stroke-width="2">
    <line x1="24" y1="36" x2="24" y2="104"/>
    <line x1="24" y1="104" x2="108" y2="104"/>
    <line x1="24" y1="70" x2="108" y2="70"/>
    <line x1="66" y1="36" x2="66" y2="104"/>
  </g>
  <!-- rising dilatation curve -->
  <polyline points="28,96 48,84 68,62 88,44 102,30" fill="none" stroke="#f2a922" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- plotted X marks -->
  <g stroke="#ffffff" stroke-width="5" stroke-linecap="round">
    <path d="M42,78 l12,12 M54,78 l-12,12"/>
    <path d="M80,40 l12,12 M92,40 l-12,12"/>
  </g>
  <!-- heartbeat -->
  <path d="M24 22 h18 l5 -9 6 16 5 -7 h22" fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
